<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Script imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@0.574.0/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/lucide@0.574.0"></script>

    <script type="module" src="./js/db.js"></script>
    <script type="module" src="./js/main.js" defer></script>
    <!-- Links -->
    <link rel="stylesheet" href="style/global.css" />
    <title>ENDGME</title>
  </head>
  <body>
    <header>
      <div class="mobile-menu-button-container">
        <button class="mobile-menu-button" title="Open navigation menu">
          <i data-lucide="menu"></i>
        </button>
      </div>
      <h1>
        <a href="index.html">ENDGME</a>
      </h1>
      <div class="header-menu" id="desktop-header-menu">
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
          </ul>
        </nav>
      </div>

      <div class="cart-container">
        <button class="cart-button">
          <i data-lucide="shopping-cart" class="shopping-cart"></i>
          <p id="cart-count"></p>
        </button>
      </div>
    </header>
    <aside class="header-menu mobile-header-menu">
      <nav>
        <button class="mobile-menu-button" title="Close navigation menu">
          <i data-lucide="x"></i>
        </button>
        <ul class="mobile-menu-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Shop</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
    </aside>
    <aside class="cart-drawer">
      <div class="cart-container">
        <button class="cart-button">
          <i data-lucide="x" class="shopping-cart"></i>
          <p id="cart-count"></p>
        </button>
        <h3>Your Cart</h3>
      </div>
      <div id="cart-items-container"></div>
    </aside>
    <main>
        <div class="product-container"></div>
      <img src="./assets/placeholders/image.png" alt=" Product Image" />
      <div class="product-info">
        <h1>Product Name</h1>
        <p>Product Description</p>
        <p>Price: $120,00</p>
      </div>
    </main>
    <footer>
      <div class="footer-input-container">
        <input
          class="footer-email-input"
          type="email"
          placeholder="Sign up for our newsletter!"
        />
        <input type="submit" value="Subscribe" class="footer-subscribe-btn" />
      </div>
      <div class="footer-content">
        <div class="footer-contact">
          <h3>Contact</h3>
          <p>contact@endgme.com</p>
          <p>+46 71 234 56 78</p>
          <p>Oxtorgsgatan 28, 553 84, Jönköping, Sweden</p>
        </div>
        <div class="footer-socials">
          <h3>Socials</h3>
          <a href="#"><i data-lucide="facebook"></i></a>
          <a href="#"><i data-lucide="twitter"></i></a>
          <a href="#"><i data-lucide="instagram"></i></a>
          <a href="#"><i data-lucide="youtube"></i></a>
          <a href="#"><i data-lucide="linkedin"></i></a>
        </div>
      </div>
      <div class="footer-copyright">
        <p>ENDGME</p>
        <p>&copy; 2026. All rights reserved.</p>
      </div>
    </footer>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
